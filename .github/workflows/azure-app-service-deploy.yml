name: Azure App Service Deploy (Reusable)

# Reusable workflow: build an app into a Docker image and deploy to Azure App
# Service via ACR. Supports both Node.js-built sites (Gatsby, etc.) and plain
# static HTML sites (no npm step needed).
#
# Tag strategy:
#   develop push -> staging-<sha7>    -> staging environment
#   main push    -> production-<sha7> -> production environment
#   v* tag       -> v<semver>         -> production environment (release)

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name pushed to ACR (e.g. spectrum-app)
        required: true
        type: string
      service_name:
        description: Value passed as SERVICE_NAME Dockerfile build-arg
        required: true
        type: string
      node_version:
        description: Node.js version (only used when run_build is true)
        required: false
        type: string
        default: '20'
      run_build:
        description: |
          Run npm install + build before Docker. Set false for plain static
          sites that have no Node.js build step.
        required: false
        type: boolean
        default: true
      build_command:
        description: npm build command (only used when run_build is true)
        required: false
        type: string
        default: 'npm run build'
      dockerfile:
        description: Dockerfile used by CI/CD builds
        required: false
        type: string
        default: 'Dockerfile.hybrid'
      health_check_path:
        description: HTTP path polled after each deploy
        required: false
        type: string
        default: '/health'
      gatsby_validation:
        description: |
          Fail the test job if a deprecated gatsby-image import is found.
          Implies run_build (Node.js must be available).
        required: false
        type: boolean
        default: false
      environment:
        description: Manual override target environment (staging or production)
        required: false
        type: string
        default: ''
      skip_tests:
        description: Skip the test job entirely
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

jobs:
  # ---------------------------------------------------------------------------
  # test
  # Skipped entirely when:
  #   - skip_tests is true, OR
  #   - run_build is false AND gatsby_validation is false
  #     (nothing to test for a plain static site)
  # ---------------------------------------------------------------------------
  test:
    if: >
      !inputs.skip_tests &&
      (inputs.run_build || inputs.gatsby_validation)
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: inputs.run_build
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        if: inputs.run_build
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Lint
        if: inputs.run_build
        run: npm run lint || echo "No lint script, skipping"

      - name: Unit tests
        if: inputs.run_build
        run: npm test || echo "No test script, skipping"

      - name: Validate Gatsby v5 (no deprecated gatsby-image)
        if: inputs.gatsby_validation
        run: |
          if grep -rn "from 'gatsby-image'\|from \"gatsby-image\"" src/ > /dev/null 2>&1; then
            echo "::error::Deprecated gatsby-image import found - use gatsby-plugin-image"
            exit 1
          fi
          echo "gatsby-plugin-image confirmed"

      - name: Security audit
        if: inputs.run_build
        run: npm audit --audit-level critical || echo "Audit found issues - proceeding (build-time deps only)"

  # ---------------------------------------------------------------------------
  # build
  # ---------------------------------------------------------------------------
  build:
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    name: Build and Push Container
    outputs:
      sha-short: ${{ steps.version.outputs.sha_short }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: inputs.run_build
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        if: inputs.run_build
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build site
        if: inputs.run_build
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          ${{ inputs.build_command }}
          test -d public || (echo "::error::public/ not found after build" && exit 1)
          echo "Build output: $(du -sh public/ | cut -f1)"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.REGISTRY }}

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          elif [ -f package.json ]; then
            echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          else
            echo "version=1.0.0" >> $GITHUB_OUTPUT
          fi
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=staging-${{ steps.version.outputs.sha_short }},enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=production-${{ steps.version.outputs.sha_short }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            SERVICE_NAME=${{ inputs.service_name }}
            SERVICE_PORT=8080
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # deploy-staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop' || inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    name: Deploy to Staging

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP_STAGING }}" \
            --name "${{ secrets.WEBAPP_NAME_STAGING }}" \
            --container-image-name "${{ env.REGISTRY }}/${{ inputs.image_name }}:staging-${{ needs.build.outputs.sha-short }}" \
            --container-registry-url "https://${{ env.REGISTRY }}"

      - name: Health check
        run: |
          APP_URL="https://${{ secrets.WEBAPP_NAME_STAGING }}.azurewebsites.net"
          sleep 30
          for i in {1..10}; do
            if curl -f -s "$APP_URL${{ inputs.health_check_path }}" > /dev/null; then
              echo "Health check passed (attempt $i)"; exit 0
            fi
            echo "Attempt $i failed, retrying in 30s..."
            [ $i -eq 10 ] && exit 1
            sleep 30
          done

      - name: Smoke test
        run: curl -f -s "https://${{ secrets.WEBAPP_NAME_STAGING }}.azurewebsites.net" > /dev/null

      - name: Notify Teams (success)
        if: success() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Staging Deploy: Success"},
                  {"type": "TextBlock", "text": "**App:** https://${{ secrets.WEBAPP_NAME_STAGING }}.azurewebsites.net\n\n**Commit:** ${{ github.sha }}\n\n**Image:** staging-${{ needs.build.outputs.sha-short }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

      - name: Notify Teams (failure)
        if: failure() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Staging Deploy: FAILED", "color": "attention"},
                  {"type": "TextBlock", "text": "**Commit:** ${{ github.sha }}\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

  # ---------------------------------------------------------------------------
  # deploy-production
  # ---------------------------------------------------------------------------
  deploy-production:
    needs: [build, deploy-staging]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    name: Deploy to Production

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP_PRODUCTION }}" \
            --name "${{ secrets.WEBAPP_NAME_PRODUCTION }}" \
            --container-image-name "${{ env.REGISTRY }}/${{ inputs.image_name }}:production-${{ needs.build.outputs.sha-short }}" \
            --container-registry-url "https://${{ env.REGISTRY }}"

      - name: Health check
        run: |
          APP_URL="https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net"
          sleep 60
          for i in {1..15}; do
            if curl -f -s "$APP_URL${{ inputs.health_check_path }}" > /dev/null; then
              echo "Health check passed (attempt $i)"; exit 0
            fi
            echo "Attempt $i failed, retrying in 45s..."
            [ $i -eq 15 ] && exit 1
            sleep 45
          done

      - name: Smoke test
        run: |
          APP_URL="https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net"
          for i in {1..5}; do
            if curl -f -s "$APP_URL" > /dev/null; then echo "Smoke test passed"; exit 0; fi
            [ $i -eq 5 ] && exit 1
            sleep 15
          done

      - name: Notify Teams (success)
        if: success() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Production Deploy: Success"},
                  {"type": "TextBlock", "text": "**App:** https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net\n\n**Commit:** ${{ github.sha }}\n\n**Image:** production-${{ needs.build.outputs.sha-short }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

      - name: Notify Teams (failure)
        if: failure() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Production Deploy: FAILED", "color": "attention"},
                  {"type": "TextBlock", "text": "**Commit:** ${{ github.sha }}\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

  # ---------------------------------------------------------------------------
  # deploy-release  (semver tag push)
  # ---------------------------------------------------------------------------
  deploy-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    name: Deploy Release to Production

    steps:
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy release to App Service
        run: |
          az webapp config container set \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP_PRODUCTION }}" \
            --name "${{ secrets.WEBAPP_NAME_PRODUCTION }}" \
            --container-image-name "${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ steps.ver.outputs.VERSION }}" \
            --container-registry-url "https://${{ env.REGISTRY }}"

      - name: Health check
        run: |
          APP_URL="https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net"
          sleep 60
          for i in {1..15}; do
            if curl -f -s "$APP_URL${{ inputs.health_check_path }}" > /dev/null; then
              echo "Health check passed (attempt $i)"; exit 0
            fi
            [ $i -eq 15 ] && exit 1
            sleep 45
          done

      - name: Notify Teams (success)
        if: success() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Release Deploy: ${{ steps.ver.outputs.VERSION }}"},
                  {"type": "TextBlock", "text": "**App:** https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net\n\n**Version:** ${{ steps.ver.outputs.VERSION }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

      - name: Notify Teams (failure)
        if: failure() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Release Deploy: FAILED", "color": "attention"},
                  {"type": "TextBlock", "text": "**Version:** ${{ steps.ver.outputs.VERSION }}\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true
