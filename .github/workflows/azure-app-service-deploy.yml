name: Azure App Service Deploy (Reusable)

# Reusable workflow: build an app into a Docker image and deploy to Azure App
# Service via ACR. Supports both Node.js-built sites (Gatsby, etc.) and plain
# static HTML sites (no npm step needed).
#
# Tag strategy:
#   develop push -> staging + staging-<sha7>  -> ACR webhook restarts staging App Service
#   main push    -> production-<sha7> (retag) -> PR to gitops_repo; ArgoCD reconciles
#   v* tag       -> v<semver> + v<maj>.<min>  -> PR to gitops_repo; ArgoCD reconciles
#
# GitOps promotion:
#   Production and release deploys open a PR in the caller-supplied gitops_repo.
#   ArgoCD reconciles on merge; the workflow never calls az webapp config container set
#   for production. Requires GITOPS_TOKEN secret (fine-grained PAT: Contents + PRs write
#   on the gitops repo only).
#
#   Staging uses a floating :staging tag. Configure an ACR continuous deployment
#   webhook on the staging App Service so pushes trigger an automatic restart.
#   No deploy step is needed in this workflow for staging.

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name pushed to ACR (e.g. spectrum-app)
        required: true
        type: string
      service_name:
        description: Value passed as SERVICE_NAME Dockerfile build-arg
        required: true
        type: string
      node_version:
        description: Node.js version (only used when run_build is true)
        required: false
        type: string
        default: '20'
      run_build:
        description: |
          Run npm install + build before Docker. Set false for plain static
          sites that have no Node.js build step.
        required: false
        type: boolean
        default: true
      build_command:
        description: npm build command (only used when run_build is true)
        required: false
        type: string
        default: 'npm run build'
      dockerfile:
        description: Dockerfile to use (default Dockerfile.hybrid for backward compat)
        required: false
        type: string
        default: 'Dockerfile.hybrid'
      build_artifact:
        description: Name of a pre-built artifact to download into public/ before docker build
        required: false
        type: string
        default: ''
      health_check_path:
        description: HTTP path polled after each deploy
        required: false
        type: string
        default: '/health'
      gatsby_validation:
        description: |
          Fail the test job if a deprecated gatsby-image import is found.
          Implies run_build (Node.js must be available).
        required: false
        type: boolean
        default: false
      environment:
        description: Manual override target environment (staging or production)
        required: false
        type: string
        default: ''
      skip_tests:
        description: Skip the test job entirely
        required: false
        type: boolean
        default: false
      gitops_repo:
        description: |
          GitOps repo to open promotion PRs against (e.g. org/homelab-gitops).
          When set, production and release deploys commit the new image tag and
          open a PR rather than calling az webapp config container set directly.
          Requires GITOPS_TOKEN secret. Leave empty to use legacy direct-deploy.
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

jobs:
  # ---------------------------------------------------------------------------
  # test
  # Skipped entirely when:
  #   - skip_tests is true, OR
  #   - run_build is false AND gatsby_validation is false
  #     (nothing to test for a plain static site)
  # ---------------------------------------------------------------------------
  test:
    if: >
      !inputs.skip_tests &&
      (inputs.run_build || inputs.gatsby_validation)
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        if: inputs.run_build
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        if: inputs.run_build
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Lint
        if: inputs.run_build
        run: npm run lint || echo "No lint script, skipping"

      - name: Unit tests
        if: inputs.run_build
        run: npm test || echo "No test script, skipping"

      - name: Validate Gatsby v5 (no deprecated gatsby-image)
        if: inputs.gatsby_validation
        run: |
          if grep -rn "from 'gatsby-image'\|from \"gatsby-image\"" src/ > /dev/null 2>&1; then
            echo "::error::Deprecated gatsby-image import found - use gatsby-plugin-image"
            exit 1
          fi
          echo "gatsby-plugin-image confirmed"

      - name: Security audit
        if: inputs.run_build
        run: npm audit --audit-level critical || echo "Audit found issues - proceeding (build-time deps only)"

  # ---------------------------------------------------------------------------
  # build
  # develop push: builds image, pushes :staging + :staging-<sha7>
  # main push:    retags :staging-<sha7> as :production-<sha7> via az acr import
  # v* tag:       retags :production-<sha7> as :v<semver> + :v<maj>.<min>
  # PR:           builds image, pushes :pr-<number>
  # ---------------------------------------------------------------------------
  build:
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    name: Build and Push Container
    outputs:
      sha-short: ${{ steps.version.outputs.sha_short }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      # Node build only needed on develop/PR (first build). main and v* retag only.
      - uses: actions/setup-node@v6
        if: >
          inputs.run_build &&
          (github.ref == 'refs/heads/develop' ||
           startsWith(github.ref, 'refs/pull/'))
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        if: >
          inputs.run_build &&
          (github.ref == 'refs/heads/develop' ||
           startsWith(github.ref, 'refs/pull/'))
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build site
        if: >
          inputs.run_build &&
          (github.ref == 'refs/heads/develop' ||
           startsWith(github.ref, 'refs/pull/'))
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          ${{ inputs.build_command }}
          test -d public || (echo "::error::public/ not found after build" && exit 1)
          echo "Build output: $(du -sh public/ | cut -f1)"

      - uses: docker/setup-buildx-action@v4
        if: >
          github.ref == 'refs/heads/develop' ||
          startsWith(github.ref, 'refs/pull/')

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.REGISTRY }}

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [ -f package.json ]; then
            echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0.0" >> "$GITHUB_OUTPUT"
          fi
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # --- develop / PR: full docker build + push ----------------------------
      - name: Extract metadata (develop/PR)
        id: meta
        if: >
          github.ref == 'refs/heads/develop' ||
          startsWith(github.ref, 'refs/pull/')
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=staging-${{ steps.version.outputs.sha_short }},enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Download pre-built site artifact
        if: inputs.build_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build_artifact }}
          path: public/

      - name: Build and push Docker image (develop/PR)
        if: >
          github.ref == 'refs/heads/develop' ||
          startsWith(github.ref, 'refs/pull/')
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            SERVICE_NAME=${{ inputs.service_name }}
            SERVICE_PORT=8080
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- main: retag staging-<sha7> as production-<sha7> ------------------
      - name: Retag staging image as production (main)
        if: github.ref == 'refs/heads/main'
        run: |
          az acr import \
            --name "${{ env.REGISTRY }}" \
            --source "${{ env.REGISTRY }}/${{ inputs.image_name }}:staging-${{ steps.version.outputs.sha_short }}" \
            --image "${{ inputs.image_name }}:production-${{ steps.version.outputs.sha_short }}" \
            --force

      # --- v* tag: retag production-<sha7> as v<semver> + v<maj>.<min> ------
      - name: Retag production image as semver (v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          SEMVER="${GITHUB_REF#refs/tags/v}"
          MINOR="${SEMVER%.*}"
          az acr import \
            --name "${{ env.REGISTRY }}" \
            --source "${{ env.REGISTRY }}/${{ inputs.image_name }}:production-${{ steps.version.outputs.sha_short }}" \
            --image "${{ inputs.image_name }}:v${SEMVER}" \
            --force
          az acr import \
            --name "${{ env.REGISTRY }}" \
            --source "${{ env.REGISTRY }}/${{ inputs.image_name }}:production-${{ steps.version.outputs.sha_short }}" \
            --image "${{ inputs.image_name }}:v${MINOR}" \
            --force

  # ---------------------------------------------------------------------------
  # promote-production
  # Triggered by main push. Opens a PR in gitops_repo to update the image tag.
  # Falls back to direct az webapp deploy when gitops_repo is not set.
  # ---------------------------------------------------------------------------
  promote-production:
    needs: build
    if: github.ref == 'refs/heads/main' || inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    name: Promote to Production

    steps:
      # --- GitOps path -------------------------------------------------------
      - name: Open GitOps PR (production)
        id: gitops_pr
        if: inputs.gitops_repo != ''
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          BRANCH="deploy/${{ inputs.image_name }}-production-${{ needs.build.outputs.sha-short }}"
          TAG="production-${{ needs.build.outputs.sha-short }}"
          IMAGE="${{ env.REGISTRY }}/${{ inputs.image_name }}:${TAG}"

          gh repo clone "${{ inputs.gitops_repo }}" gitops-repo -- --depth=1
          cd gitops-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Update image tag - sed targets the image line for this service.
          # Adjust the pattern if your manifest structure differs.
          grep -rl "${{ inputs.image_name }}" . --include="*.yaml" --include="*.yml" | head -20 | \
            xargs sed -i "s|${{ env.REGISTRY }}/${{ inputs.image_name }}:.*|${IMAGE}|g"

          git add -A
          git commit -m "deploy(${{ inputs.image_name }}): promote production-${{ needs.build.outputs.sha-short }}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --repo "${{ inputs.gitops_repo }}" \
            --base main \
            --head "$BRANCH" \
            --title "deploy: ${{ inputs.image_name }} production-${{ needs.build.outputs.sha-short }}" \
            --body "Promote \`${{ inputs.image_name }}\` to production.

          **Image:** \`${IMAGE}\`
          **Commit:** ${{ github.sha }}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Merge to deploy. ArgoCD will reconcile on merge.")

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Notify Teams - GitOps PR ready for approval
        if: inputs.gitops_repo != '' && env.TEAMS_WEBHOOK_URL != ''
        run: |
          # shellcheck disable=SC2016
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Production Promotion: Approval Required"},
                  {"type": "TextBlock", "text": "**App:** ${{ inputs.image_name }}\n\n**Image:** production-${{ needs.build.outputs.sha-short }}\n\n**Commit:** ${{ github.sha }}\n\n**PR:** ${{ steps.gitops_pr.outputs.pr_url }}", "wrap": true}
                ],
                "actions": [
                  {"type": "Action.OpenUrl", "title": "Review PR", "url": "${{ steps.gitops_pr.outputs.pr_url }}"}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

      # --- Legacy direct-deploy path (gitops_repo not set) ------------------
      - name: Login to Azure (legacy)
        if: inputs.gitops_repo == ''
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service (legacy)
        if: inputs.gitops_repo == ''
        run: |
          az webapp config container set \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP_PRODUCTION }}" \
            --name "${{ secrets.WEBAPP_NAME_PRODUCTION }}" \
            --container-image-name "${{ env.REGISTRY }}/${{ inputs.image_name }}:production-${{ needs.build.outputs.sha-short }}" \
            --container-registry-url "https://${{ env.REGISTRY }}"

      - name: Health check (legacy)
        if: inputs.gitops_repo == ''
        run: |
          sleep 60
          for i in {1..15}; do
            if curl -f -s "https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net${{ inputs.health_check_path }}" > /dev/null; then
              echo "Health check passed (attempt $i)"; exit 0
            fi
            echo "Attempt $i failed, retrying in 45s..."
            [ "$i" -eq 15 ] && exit 1
            sleep 45
          done

      - name: Smoke test (legacy)
        if: inputs.gitops_repo == ''
        run: |
          for i in {1..5}; do
            if curl -f -s "https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net" > /dev/null; then echo "Smoke test passed"; exit 0; fi
            [ "$i" -eq 5 ] && exit 1
            sleep 15
          done

      - name: Notify Teams (legacy success)
        if: inputs.gitops_repo == '' && success() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          # shellcheck disable=SC2016
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Production Deploy: Success"},
                  {"type": "TextBlock", "text": "**App:** https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net\n\n**Commit:** ${{ github.sha }}\n\n**Image:** production-${{ needs.build.outputs.sha-short }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

      - name: Notify Teams (legacy failure)
        if: inputs.gitops_repo == '' && failure() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          # shellcheck disable=SC2016
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Production Deploy: FAILED", "color": "attention"},
                  {"type": "TextBlock", "text": "**Commit:** ${{ github.sha }}\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

  # ---------------------------------------------------------------------------
  # promote-release  (semver tag push)
  # Opens a PR in gitops_repo to update the image tag to vX.Y.Z.
  # Falls back to direct az webapp deploy when gitops_repo is not set.
  # ---------------------------------------------------------------------------
  promote-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    name: Promote Release to Production

    steps:
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # --- GitOps path -------------------------------------------------------
      - name: Open GitOps PR (release)
        id: gitops_pr
        if: inputs.gitops_repo != ''
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          BRANCH="deploy/${{ inputs.image_name }}-v${{ steps.ver.outputs.VERSION }}"
          TAG="v${{ steps.ver.outputs.VERSION }}"
          IMAGE="${{ env.REGISTRY }}/${{ inputs.image_name }}:${TAG}"

          gh repo clone "${{ inputs.gitops_repo }}" gitops-repo -- --depth=1
          cd gitops-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          grep -rl "${{ inputs.image_name }}" . --include="*.yaml" --include="*.yml" | head -20 | \
            xargs sed -i "s|${{ env.REGISTRY }}/${{ inputs.image_name }}:.*|${IMAGE}|g"

          git add -A
          git commit -m "deploy(${{ inputs.image_name }}): release v${{ steps.ver.outputs.VERSION }}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --repo "${{ inputs.gitops_repo }}" \
            --base main \
            --head "$BRANCH" \
            --title "release: ${{ inputs.image_name }} v${{ steps.ver.outputs.VERSION }}" \
            --body "Release \`${{ inputs.image_name }}\` version \`v${{ steps.ver.outputs.VERSION }}\` to production.

          **Image:** \`${IMAGE}\`
          **Commit:** ${{ github.sha }}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Merge to deploy. ArgoCD will reconcile on merge.")

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Notify Teams - release PR ready for approval
        if: inputs.gitops_repo != '' && env.TEAMS_WEBHOOK_URL != ''
        run: |
          # shellcheck disable=SC2016
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Release Promotion: Approval Required"},
                  {"type": "TextBlock", "text": "**App:** ${{ inputs.image_name }}\n\n**Version:** v${{ steps.ver.outputs.VERSION }}\n\n**PR:** ${{ steps.gitops_pr.outputs.pr_url }}", "wrap": true}
                ],
                "actions": [
                  {"type": "Action.OpenUrl", "title": "Review PR", "url": "${{ steps.gitops_pr.outputs.pr_url }}"}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

      # --- Legacy direct-deploy path (gitops_repo not set) ------------------
      - name: Login to Azure (legacy)
        if: inputs.gitops_repo == ''
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy release to App Service (legacy)
        if: inputs.gitops_repo == ''
        run: |
          az webapp config container set \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP_PRODUCTION }}" \
            --name "${{ secrets.WEBAPP_NAME_PRODUCTION }}" \
            --container-image-name "${{ env.REGISTRY }}/${{ inputs.image_name }}:v${{ steps.ver.outputs.VERSION }}" \
            --container-registry-url "https://${{ env.REGISTRY }}"

      - name: Health check (legacy)
        if: inputs.gitops_repo == ''
        run: |
          sleep 60
          for i in {1..15}; do
            if curl -f -s "https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net${{ inputs.health_check_path }}" > /dev/null; then
              echo "Health check passed (attempt $i)"; exit 0
            fi
            [ "$i" -eq 15 ] && exit 1
            sleep 45
          done

      - name: Notify Teams (legacy success)
        if: inputs.gitops_repo == '' && success() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          # shellcheck disable=SC2016
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Release Deploy: v${{ steps.ver.outputs.VERSION }} - Success"},
                  {"type": "TextBlock", "text": "**App:** https://${{ secrets.WEBAPP_NAME_PRODUCTION }}.azurewebsites.net\n\n**Version:** v${{ steps.ver.outputs.VERSION }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true

      - name: Notify Teams (legacy failure)
        if: inputs.gitops_repo == '' && failure() && env.TEAMS_WEBHOOK_URL != ''
        run: |
          # shellcheck disable=SC2016
          curl -sSf -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {"type": "TextBlock", "size": "medium", "weight": "bolder", "text": "Release Deploy: FAILED", "color": "attention"},
                  {"type": "TextBlock", "text": "**Version:** v${{ steps.ver.outputs.VERSION }}\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "wrap": true}
                ]
              }
            }]
          }' "${{ env.TEAMS_WEBHOOK_URL }}" || true
